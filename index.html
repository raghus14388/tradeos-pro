const aiQuery = async (prompt, useWebSearch = true) => {
  try {
    const body = { model: "claude-sonnet-4-20250514", max_tokens: 2000, messages: [{ role: "user", content: prompt }] };
    if (useWebSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    const data = await r.json();
    const text = data.content?.filter(c => c.type === "text").map(c => c.text).join("\n") || "";
    return text;
  } catch (e) { console.error("AI query failed:", e); return null; }
};

const aiQueryJSON = async (prompt, useWebSearch = true) => {
  const fullPrompt = prompt + "\n\nRespond ONLY with valid JSON. No markdown, no backticks, no explanation. Just the JSON object/array.";
  const text = await aiQuery(fullPrompt, useWebSearch);
  if (!text) return null;
  try {
    const clean = text.replace(/```json\s*/g, "").replace(/```\s*/g, "").trim();
    return JSON.parse(clean);
  } catch { return null; }
};

// Smart buyer finder: cache → DB → AI+web search
const findBuyersLive = async (product, country) => {
  const key = `buyers:${product}:${country}`.toLowerCase().replace(/\s+/g, "_");

  // 1. Check cache
  const cached = await cacheGet(key);
  if (cached) return { buyers: cached, source: "cache" };

  // 2. Check DB (importer_records + seeded buyers)
  const dbBuyers = await sbGet("buyers", `?country=eq.${country}&order=risk_score.desc`);
  const importers = await sbGet("importer_records", `?importer_country=eq.${country}&order=value_usd.desc.nullslast&limit=10`);

  // 3. If DB has good data, use it
  const relevantDB = (dbBuyers || []).filter(b => {
    const prods = jp(b.products_imported).map(p => p.toLowerCase()).join(" ");
    return product.toLowerCase().split(/[\s(]+/).some(w => w.length > 3 && prods.includes(w));
  });

  if (relevantDB.length >= 3) return { buyers: relevantDB, source: "database" };

  // 4. Fall back to AI + web search for real buyers
  const aiResult = await aiQueryJSON(`Search the web and find real companies that import ${product} into ${country}. 
Find actual company names, cities, and what they import. Use ImportYeti, trade directories, and company databases.
Return a JSON array of objects with these fields: 
{"company_name": "", "city": "", "products": "", "estimated_volume": "", "payment_likely": "", "risk_notes": "", "source_url": ""}
Find at least 5 real companies. Every company must be a REAL verifiable business.`);

  if (aiResult && Array.isArray(aiResult) && aiResult.length > 0) {
    await cacheSet(key, "buyers", aiResult, product, country);
    return { buyers: aiResult.map((b, i) => ({
      id: `ai_${i}`, company_name: b.company_name, country, city: b.city,
      products_imported: JSON.stringify([b.products || product]),
      annual_volume_tons: 0, avg_purchase_price_usd: 0,
      payment_preference: b.payment_likely || "TBD", risk_score: 50,
      notes: b.risk_notes || "", verified: false, source: "ai_web_search",
      source_url: b.source_url || ""
    })), source: "ai_live" };
  }

  return { buyers: relevantDB.length > 0 ? relevantDB : (dbBuyers || []).slice(0, 5), source: "database_fallback" };
};

const getComplianceLive = async (hsCode, country) => {

};

/* ═══ ONBOARDING ═══ */
function Onboarding({ onDone }) {
  const [n, sN] = useState(""); const [c, sC] = useState(""); const [st, sSt] = useState("Karnataka");
  const [cap, sCap] = useState(1000000); const [risk, sR] = useState("moderate"); const [tl, sTl] = useState(12); const [ld, sLd] = useState(false);
  const go = async () => { if (!n.trim() || !c.trim()) return; sLd(true);
    const r = await sbPost("traders", { name: n.trim(), city: c.trim(), state: st, available_capital: cap, risk_appetite: risk, timeline_months: tl });
    if (r && r.length) onDone(r[0]); sLd(false); };
  return (<div className="O"><div className="Oh"><h1>Capital in.<br />Strategy out.</h1><p>Enter your capital. Our engine finds the highest-return trade lanes and executes end-to-end.</p></div>
    <div className="Of">
      <div className="fg"><label className="fl">Your Name</label><input className="fi" placeholder="e.g. Raghav" value={n} onChange={e => sN(e.target.value)} /></div>
      <div className="fg"><label className="fl">Available Capital</label><div className="cd">{fI(cap)}</div>
        <input type="range" className="cs" min={200000} max={5000000} step={50000} value={cap} onChange={e => sCap(+e.target.value)} />
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 3 }}><span style={{ font: "10px var(--m)", color: "var(--t3)" }}>₹2L</span><span style={{ font: "10px var(--m)", color: "var(--t3)" }}>₹50L</span></div></div>
      <div className="fg"><label className="fl">Risk Appetite</label><div className="ro">
        {["conservative", "moderate", "aggressive"].map(r => <button key={r} className={`rb ${risk === r ? "a" : ""}`} onClick={() => sR(r)}>{r === "conservative" ? "🛡 Safe" : r === "moderate" ? "⚖️ Balanced" : "🚀 Aggressive"}</button>)}</div></div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <div className="fg"><label className="fl">City</label><input className="fi" placeholder="e.g. Bengaluru" value={c} onChange={e => sC(e.target.value)} /></div>
        <div className="fg"><label className="fl">State</label><select className="fs" value={st} onChange={e => sSt(e.target.value)}>{STATES.map(s => <option key={s}>{s}</option>)}</select></div></div>
      <div className="fg"><label className="fl">Timeline</label><select className="fs" value={tl} onChange={e => sTl(+e.target.value)}>
        <option value={6}>6 months — Sprint</option><option value={12}>12 months — Standard</option><option value={24}>24 months — Long play</option></select></div>
      <button className="sb" onClick={go} disabled={ld || !n.trim() || !c.trim()}>{ld ? "Analyzing markets..." : "Find My Trade Lanes →"}</button>
    </div></div>);
}

/* ═══ BUYER MODULE ═══ */
function BuyerMod({ deal, lane, onLink }) {
  const [buyers, sB] = useState([]); const [ld, sL] = useState(true); const [em, sE] = useState(null); const [eb, sEB] = useState(""); const [gl, sGL] = useState(false);
  const [src, sSrc] = useState("");
  useEffect(() => { (async () => {
    const result = await findBuyersLive(deal.product_name, deal.destination_country);
    const scored = (result.buyers || []).map(x => { const pr = jp(x.products_imported); const mt = pr.some(p => deal.product_name.toLowerCase().includes(p.toLowerCase()) || p.toLowerCase().includes(deal.product_name.split("(")[0].trim().split(" ")[0].toLowerCase())); return { ...x, rel: mt ? 100 : 40, pr: pr.length ? pr : [deal.product_name] }; }).sort((a, b) => (b.rel + (b.risk_score||50)) - (a.rel + (a.risk_score||50)));
    sB(scored); sSrc(result.source); sL(false);
  })(); }, [deal.destination_country, deal.product_name]);

  const gen = async (buyer) => {
    sE(buyer); sGL(true);
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: `Draft a professional 120-word export inquiry email body. Product: ${deal.product_name} (HS ${deal.hs_code}). Origin: India. Qty: ${deal.quantity_kg}kg. FOB: $${deal.fob_price_per_kg_usd}/kg. Buyer: ${buyer.company_name}, ${buyer.city}. They import ${jp(buyer.products_imported).join(", ")} (~${buyer.annual_volume_tons}T/yr). ${lane?.fta_applicable ? `FTA: ${lane.fta_name}, 0% vs ${lane.mfn_duty_pct}% MFN.` : ""} Write ONLY the email body. Professional, specific, clear CTA.` }] }) });
      const d = await resp.json(); sEB(d.content?.map(c => c.text || "").join("") || "Error generating. Check API.");
    } catch { sEB(`Dear ${buyer.contact_person || "Sir/Madam"},\n\nWe are pleased to introduce our premium ${deal.product_name}, sourced directly from ${lane?.origin_region || "India"}.\n\nKey details:\n- Available quantity: ${deal.quantity_kg}kg\n- FOB price: $${deal.fob_price_per_kg_usd}/kg\n- Quality: Export grade, all certifications available\n${lane?.fta_applicable ? `- FTA benefit: ${lane.fta_name} — 0% preferential duty\n` : ""}\nWe would welcome the opportunity to send a sample for your evaluation. Could we schedule a brief call this week?\n\nBest regards`); }
    sGL(false);
  };

  if (ld) return <div><div className="sp" /><p className="mu">Searching real importers in {deal.destination_country}...</p></div>;
  return (<div>
    <div className="cd2"><h3>🔍 Buyer Discovery — {deal.destination_country}</h3>
      <p style={{ fontSize: 12, color: "var(--t2)", marginTop: -8, marginBottom: 14 }}>{buyers.length} importers found · Source: {src === "ai_live" ? "🌐 AI + Web Search (live)" : src === "cache" ? "⚡ Cached intelligence" : "📊 Trade database"}</p>
      {buyers.map(b => <div className="bc" key={b.id}>
        <div className="bch"><div><div className="bcn">{b.company_name}</div><div className="bcc">{b.city}, {b.country} · {b.payment_preference}</div></div>
          <div className={`brs ${b.risk_score >= 80 ? "brh" : b.risk_score >= 60 ? "brm" : "brl"}`}>{b.risk_score}</div></div>
        <div className="bmg">
          <div className="bmi"><div className="bmil">Volume</div><div className="bmiv">{b.annual_volume_tons}T/yr</div></div>
          <div className="bmi"><div className="bmil">Avg Price</div><div className="bmiv">${b.avg_purchase_price_usd}</div></div>
          <div className="bmi"><div className="bmil">Products</div><div className="bmiv" style={{ fontSize: 10, fontFamily: "var(--f)" }}>{b.pr?.slice(0, 3).join(", ")}</div></div>
        </div>
        {b.notes && <p style={{ fontSize: 10, color: "var(--t2)", marginBottom: 10, fontStyle: "italic" }}>{b.notes}</p>}
        {b.verified && <span className="tgi tf" style={{ marginBottom: 10, display: "inline-block" }}>✓ Verified</span>}
        <div style={{ display: "flex", gap: 6 }}>
          <button className="btn b1" onClick={() => gen(b)}>✉ Draft Outreach</button>
          <button className="btn b2" onClick={() => onLink?.(b)}>Link to Deal</button>
        </div>
      </div>)}
    </div>
    {em && <div className="md" onClick={() => sE(null)}><div className="mdb" onClick={e => e.stopPropagation()}>
      <h3>✉ Outreach to {em.company_name}</h3>
      {gl ? <div><div className="sp" /><p className="mu">AI drafting personalized email...</p></div> : <>
        <div className="ef"><label>To</label><input value={em.email || ""} readOnly /></div>
        <div className="ef"><label>Subject</label><input value={`${deal.product_name} — Direct Supply from India | FOB Inquiry`} readOnly /></div>
        <div className="ef"><label>Body</label><textarea value={eb} onChange={e => sEB(e.target.value)} /></div>
        <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
          <button className="btn b1" onClick={() => { window.open(`mailto:${em.email}?subject=${encodeURIComponent(deal.product_name + " — Direct Supply from India")}&body=${encodeURIComponent(eb)}`); sE(null); }}>Open in Mail →</button>
          <button className="btn b2" onClick={() => { navigator.clipboard?.writeText(eb); sE(null); }}>Copy & Close</button>
        </div></>}
    </div></div>}
  </div>);
}

/* ═══ PRICING MODULE ═══ */
function PriceMod({ deal, lane, cap }) {
  const proc = lane?.avg_procurement_cost_per_kg_inr || deal.procurement_cost_per_kg_inr || 1;
  const fob = lane?.avg_fob_price_per_kg_usd || deal.fob_price_per_kg_usd || 1;
  const cif = lane?.avg_cif_price_per_kg_usd || fob * 1.15;
  const qty = deal.quantity_kg || 1;
  const floor = (cap / FX) / qty, market = fob, ceiling = fob * 1.18, rec = fob * 1.02;
  const mFloor = 0, mMarket = ((market - floor) / floor * 100).toFixed(1), mCeiling = ((ceiling - floor) / floor * 100).toFixed(1), mRec = ((rec - floor) / floor * 100).toFixed(1);
  const range = ceiling - floor * 0.9; const pos = v => Math.max(5, Math.min(95, ((v - floor * 0.9) / range) * 100));

  return (<div><div className="cd2"><h3>💰 Pricing Engine — {deal.product_name}</h3>
    <p style={{ fontSize: 12, color: "var(--t2)", marginTop: -8, marginBottom: 16 }}>Floor (cost) → Market (trade avg) → Ceiling (competitor)</p>
    <div style={{ position: "relative", height: 160, background: "var(--b1)", borderRadius: 10, padding: 16, marginBottom: 16, overflow: "hidden" }}>
      <div style={{ font: "600 12px var(--m)", color: "var(--t1)" }}>Price Spectrum — USD/kg</div>
      <div style={{ font: "10px var(--f)", color: "var(--t3)", marginTop: 2 }}>Room: ${((ceiling - floor) * qty).toFixed(0)} total (${(ceiling - floor).toFixed(2)}/kg)</div>
      <div style={{ position: "absolute", bottom: 20, left: 20, right: 20, height: 8, background: "var(--b3)", borderRadius: 4 }}>
        <div style={{ position: "absolute", height: "100%", left: 0, width: `${pos(floor)}%`, background: "linear-gradient(90deg,var(--r),#f59e0b33)", borderRadius: 4 }} />
        <div style={{ position: "absolute", height: "100%", left: `${pos(floor)}%`, width: `${pos(ceiling) - pos(floor)}%`, background: "linear-gradient(90deg,#f59e0b33,var(--gb))", borderRadius: 4 }} />
      </div>
      {[{ v: floor, c: "var(--r)", l: "Floor" }, { v: rec, c: "var(--ac)", l: "Rec" }, { v: market, c: "var(--bl)", l: "Market" }, { v: ceiling, c: "var(--g)", l: "Ceiling" }].map((p, i) =>
        <div key={i} style={{ position: "absolute", bottom: 14, left: `${pos(p.v)}%`, transform: "translateX(-50%)", display: "flex", flexDirection: "column", alignItems: "center" }}>
          <div style={{ font: "600 11px var(--m)", color: p.c }}>${p.v.toFixed(2)}</div>
          <div style={{ width: 2, height: 14, background: p.c, marginBottom: 2 }} />
          <div style={{ font: "9px var(--m)", color: p.c }}>{p.l}</div>
        </div>)}
    </div>
    <div className="s3">
      <div className="sc" style={{ borderLeft: "3px solid var(--r)" }}><div className="scl">Floor (Break-even)</div><div className="scv" style={{ color: "var(--r)" }}>${floor.toFixed(2)}<span style={{ fontSize: 11, color: "var(--t3)" }}>/kg</span></div><div className="scs">0% margin · Below = loss</div></div>
      <div className="sc" style={{ borderLeft: "3px solid var(--ac)" }}><div className="scl">Recommended</div><div className="scv" style={{ color: "var(--ac)" }}>${rec.toFixed(2)}<span style={{ fontSize: 11, color: "var(--t3)" }}>/kg</span></div><div className="scs">{mRec}% margin</div></div>
      <div className="sc" style={{ borderLeft: "3px solid var(--g)" }}><div className="scl">Ceiling</div><div className="scv" style={{ color: "var(--g)" }}>${ceiling.toFixed(2)}<span style={{ fontSize: 11, color: "var(--t3)" }}>/kg</span></div><div className="scs">{mCeiling}% margin</div></div>
    </div>
    <div className="ds"><h4>P&L at Recommended Price</h4><div className="dg">
      <div className="di"><span className="dil">Revenue ({qty.toLocaleString()}kg × ${rec.toFixed(2)})</span><span className="div" style={{ color: "var(--g)" }}>{fI(rec * qty * FX)}</span></div>
      <div className="di"><span className="dil">Total Cost</span><span className="div" style={{ color: "var(--r)" }}>{fI(cap)}</span></div>
      <div className="di"><span className="dil">Gross Profit</span><span className="div" style={{ color: "var(--g)" }}>{fI(rec * qty * FX - cap)}</span></div>
      <div className="di"><span className="dil">Margin</span><span className="div" style={{ color: "var(--g)" }}>{mRec}%</span></div>
    </div></div>
    {lane?.fta_applicable && <div className="ds"><h4>FTA Advantage — {lane.fta_name}</h4><div className="dg">

/* ═══ COMPLIANCE MODULE ═══ */
function CompMod({ deal }) {

  const toggle = i => { const n = [...st]; n[i].s = n[i].s === "ns" ? "ip" : n[i].s === "ip" ? "ob" : "ns"; sS(n); };
  const done = st.filter(d => d.s === "ob").length, total = st.length;
  const mDone = st.filter(d => d.m && d.s === "ob").length, mTotal = st.filter(d => d.m).length;

        <div style={{ height: "100%", width: `${(done / total) * 100}%`, background: "linear-gradient(90deg,var(--ac),var(--g))", borderRadius: 3, transition: "width .4s" }} /></div>

        <div className="doc" key={i}><div className="dst dns" /><div className="dtx"><div className="dtn">{d}</div><div className="dta">Auto-fill from deal data</div></div><button className="dac">Generate →</button></div>)}

function SupplierMod({ deal, lane, onLinkSupplier }) {
  const [suppliers, sS] = useState([]);
  const [prices, sP] = useState([]);
  const [ld, sLd] = useState(true);

  useEffect(() => { (async () => {
    const productWords = deal.product_name.toLowerCase().split(/[\s(]+/).filter(w => w.length > 3);
    const allSuppliers = await sbGet("suppliers", "?order=reliability_score.desc");
    const matched = (allSuppliers || []).filter(s => {
      const prods = jp(s.products).map(p => p.toLowerCase()).join(" ");
      return productWords.some(w => prods.includes(w));
    }).map(s => {
      const ports = PORT_DISTANCES[s.location] || {};
      const bestPort = Object.entries(ports).sort((a, b) => a[1].cost - b[1].cost)[0];
      return { ...s, ports, bestPort: bestPort ? { name: bestPort[0], ...bestPort[1] } : null,
        landedCost: s.avg_price_per_kg_inr + (bestPort ? bestPort[1].cost : 8) };
    }).sort((a, b) => a.landedCost - b.landedCost);
    sS(matched);

    const allPrices = await sbGet("mandi_prices_raw", "?order=arrival_date.desc&limit=100");
    const relevantPrices = (allPrices || []).filter(p =>
      productWords.some(w => p.commodity.toLowerCase().includes(w))
    ).map(p => ({
      ...p,
      market_name: p.market,
      market_source: p.source,
      price_per_kg: p.modal_price / 100, // Convert quintal to kg
      recorded_at: p.arrival_date,
    }));
    sP(relevantPrices);
    sLd(false);
  })(); }, [deal.product_name]);

  const mandiGroups = {};
  prices.forEach(p => {
    if (!mandiGroups[p.market_name]) mandiGroups[p.market_name] = [];
    mandiGroups[p.market_name].push(p);
  });

  if (ld) return <div><div className="sp" /><p className="mu">Searching suppliers & mandi prices...</p></div>;

  return (<div>
    <div className="cd2"><h3>📊 Live Mandi Prices — {deal.product_name}</h3>
      <p style={{ fontSize: 12, color: "var(--t2)", marginTop: -8, marginBottom: 14 }}>{Object.keys(mandiGroups).length} mandis tracked · {prices.length} price records</p>
      <div style={{ display: "grid", gridTemplateColumns: `repeat(${Math.min(Object.keys(mandiGroups).length, 4)}, 1fr)`, gap: 10, marginBottom: 16 }}>
        {Object.entries(mandiGroups).map(([mandi, recs]) => {
          const latest = recs[0];
          const prev = recs[1];
          const change = prev ? ((latest.price_per_kg - prev.price_per_kg) / prev.price_per_kg * 100).toFixed(1) : 0;
          const isUp = change > 0;
          return (<div key={mandi} style={{ background: "var(--b1)", borderRadius: 8, padding: 14, borderLeft: `3px solid ${recs === Object.values(mandiGroups).sort((a,b) => a[0].price_per_kg - b[0].price_per_kg)[0] ? "var(--g)" : "var(--bd)"}` }}>
            <div style={{ font: "600 13px var(--f)", marginBottom: 6 }}>{mandi}</div>
            <div style={{ font: "700 22px var(--m)", color: "var(--ac)", marginBottom: 2 }}>₹{latest.price_per_kg}<span style={{ font: "11px var(--f)", color: "var(--t3)" }}>/kg</span></div>
            <div style={{ font: "11px var(--m)", color: isUp ? "var(--r)" : "var(--g)" }}>{isUp ? "▲" : "▼"} {Math.abs(change)}% vs last</div>
            <div style={{ font: "9px var(--f)", color: "var(--t3)", marginTop: 4 }}>{latest.market_source} · {new Date(latest.recorded_at).toLocaleDateString()}</div>
          </div>);
        })}
      </div>
      {Object.keys(mandiGroups).length > 1 && <div style={{ background: "var(--b1)", borderRadius: 8, padding: 12, fontSize: 12, color: "var(--t2)", marginBottom: 16 }}>
        <strong style={{ color: "var(--ac)" }}>Price Insight:</strong> {(() => {
          const sorted = Object.entries(mandiGroups).sort((a, b) => a[1][0].price_per_kg - b[1][0].price_per_kg);
          const cheapest = sorted[0]; const costliest = sorted[sorted.length - 1];
          const diff = costliest[1][0].price_per_kg - cheapest[1][0].price_per_kg;
          return `${cheapest[0]} is cheapest at ₹${cheapest[1][0].price_per_kg}/kg — ₹${diff}/kg cheaper than ${costliest[0]}. On ${deal.quantity_kg?.toLocaleString()}kg, that saves ₹${(diff * deal.quantity_kg).toLocaleString()}.`;
        })()}
      </div>}
    </div>

    <div className="cd2"><h3>🏭 Suppliers — Ranked by Landed-at-Port Cost</h3>
      <p style={{ fontSize: 12, color: "var(--t2)", marginTop: -8, marginBottom: 14 }}>{suppliers.length} suppliers found · Procurement + transport = landed cost</p>
      {suppliers.map((s, i) => <div className="bc" key={s.id}>
        <div className="bch">
          <div><div className="bcn">{i === 0 && <span style={{ color: "var(--g)", marginRight: 6 }}>★ BEST</span>}{s.name}</div>
            <div className="bcc">{s.location}, {s.state} · {s.mandi} · {s.payment_terms}</div></div>
          <div className={`brs ${s.reliability_score >= 85 ? "brh" : s.reliability_score >= 70 ? "brm" : "brl"}`}>{s.reliability_score}</div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 10 }}>
          <div className="bmi"><div className="bmil">Mandi Price</div><div className="bmiv">₹{s.avg_price_per_kg_inr}/kg</div></div>
          <div className="bmi"><div className="bmil">Transport</div><div className="bmiv" style={{ color: "var(--ac)" }}>+₹{s.bestPort ? s.bestPort.cost : "~8"}/kg</div></div>
          <div className="bmi"><div className="bmil">Landed Cost</div><div className="bmiv" style={{ color: i === 0 ? "var(--g)" : "var(--t1)" }}>₹{s.landedCost}/kg</div></div>
          <div className="bmi"><div className="bmil">Nearest Port</div><div className="bmiv" style={{ fontSize: 10, fontFamily: "var(--f)" }}>{s.bestPort ? `${s.bestPort.name} (${s.bestPort.km}km)` : "TBD"}</div></div>
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 8 }}>
          {jp(s.certifications).map((c, j) => <span key={j} className="tgi tf">{c}</span>)}
        </div>
        {s.notes && <p style={{ fontSize: 10, color: "var(--t2)", marginBottom: 10, fontStyle: "italic" }}>{s.notes}</p>}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          <div className="di"><span className="dil">Total ({deal.quantity_kg?.toLocaleString()}kg)</span><span className="div" style={{ color: "var(--ac)" }}>{fI(s.landedCost * (deal.quantity_kg || 0))}</span></div>
          <div className="di"><span className="dil">vs Budget ({fI((deal.capital_deployed_inr || 0) * 0.65)})</span><span className="div" style={{ color: s.landedCost * (deal.quantity_kg || 0) <= (deal.capital_deployed_inr || 0) * 0.65 ? "var(--g)" : "var(--r)" }}>{s.landedCost * (deal.quantity_kg || 0) <= (deal.capital_deployed_inr || 0) * 0.65 ? "✓ Within" : "✗ Over"}</span></div>
        </div>
        <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
          <button className="btn b1" onClick={() => onLinkSupplier?.(s)}>Link to Deal</button>
          {s.contact_phone && <button className="btn b2" onClick={() => window.open(`tel:${s.contact_phone}`)}>📞 Call</button>}
        </div>
      </div>)}
    </div>
  </div>);
}

/* ═══ LOGISTICS MODULE (TIER 1) ═══ */
function LogisticsMod({ deal, lane }) {
  const [rates, sR] = useState([]); const [ld, sLd] = useState(true);
  useEffect(() => { (async () => {
    const originPort = deal.origin_port || lane?.nearest_port || "";
    const portWords = originPort.split("/").map(p => p.trim());
    const all = await sbGet("freight_rates", "?order=rate_per_cbm_usd.asc.nullslast");
    const matched = (all || []).filter(r => portWords.some(pw => r.origin_port.toLowerCase().includes(pw.toLowerCase().split(" ")[0])));
    sR(matched.length > 0 ? matched : (all || []).slice(0, 8));
    sLd(false);
  })(); }, [deal.origin_port, lane]);

  const qty = deal.quantity_kg || 0;
  const bags = Math.ceil(qty / 25);
  const cbm = bags * 0.063;
  const isLCL = qty < 14000;

  if (ld) return <div><div className="sp" /><p className="mu">Loading freight rates...</p></div>;
  return (<div>
    <div className="cd2"><h3>🚢 Logistics & Freight — {deal.product_name}</h3>
      <p style={{ fontSize: 12, color: "var(--t2)", marginTop: -8, marginBottom: 14 }}>{isLCL ? "LCL (Less than Container)" : "FCL recommended"} · {cbm.toFixed(1)} CBM · {bags} bags</p>
      <div className="s3" style={{ marginBottom: 16 }}>
        <div className="sc"><div className="scl">Shipment Type</div><div className="scv" style={{ color: "var(--ac)" }}>{isLCL ? "LCL" : "FCL"}</div><div className="scs">{qty < 14000 ? "Under FCL threshold" : "Full container viable"}</div></div>
        <div className="sc"><div className="scl">Volume</div><div className="scv" style={{ color: "var(--bl)" }}>{cbm.toFixed(1)} CBM</div><div className="scs">{bags} bags × 0.063 CBM</div></div>
        <div className="sc"><div className="scl">Weight</div><div className="scv" style={{ color: "var(--g)" }}>{(qty / 1000).toFixed(1)}T</div><div className="scs">{qty.toLocaleString()} kg net</div></div>
      </div>
      {rates.map((r, i) => {
        const cost = isLCL ? (r.rate_per_cbm_usd ? r.rate_per_cbm_usd * cbm : r.rate_per_kg_usd * qty) : (r.rate_20ft_usd || 0);

      </div>}

    <div className="cd2"><h3>📋 Shipping Checklist</h3>
      {[{ n: "Book freight with forwarder", s: "pending" }, { n: "Arrange inland transport to port", s: "pending" }, { n: "Marine insurance (110% CIF value)", s: "pending" }, { n: "Container stuffing supervision", s: "pending" }, { n: "Obtain Bill of Lading", s: "pending" }, { n: "Share BL copy with buyer", s: "pending" }, { n: "Vessel tracking link to buyer", s: "pending" }].map((item, i) =>

}

/* ═══ PAYMENT SECURITY MODULE (TIER 1) ═══ */
const ECGC_RATES = { UAE: 0.45, "Saudi Arabia": 0.50, USA: 0.35, Japan: 0.30, Thailand: 0.55, Germany: 0.30, Indonesia: 0.65 };

    { method: "LC at Sight", risk: "Low", cost: "1-2% of LC value", days: "15-20 days post-shipment", rec: true, desc: "Bank-guaranteed. Safest for first shipment. Recommended for new buyers." },

      <div className="s3" style={{ marginBottom: 16 }}>
        <div className="sc" style={{ borderLeft: "3px solid var(--g)" }}><div className="scl">ECGC Premium</div><div className="scv" style={{ color: "var(--g)" }}>${ecgcPremium.toFixed(0)}</div><div className="scs">₹{Math.round(ecgcPremium * 85).toLocaleString()} · {ecgcRate}% of CIF</div></div>
        <div className="sc" style={{ borderLeft: "3px solid var(--bl)" }}><div className="scl">ECGC Coverage</div><div className="scv" style={{ color: "var(--bl)" }}>${ecgcCoverage.toFixed(0)}</div><div className="scs">85% of CIF value</div></div>
        <div className="sc" style={{ borderLeft: "3px solid var(--ac)" }}><div className="scl">Marine Insurance</div><div className="scv" style={{ color: "var(--ac)" }}>${(insuranceVal * 0.002).toFixed(0)}</div><div className="scs">0.2% of 110% CIF</div></div>
      </div>

      <div className="ds"><h4>Payment Methods — Ranked by Safety</h4>

        <div className="bch"><div><div className="bcn">{opt.rec && <span style={{ color: "var(--g)", marginRight: 6 }}>★ RECOMMENDED</span>}{opt.method}</div>
          <div className="bcc">{opt.desc}</div></div>
          <div style={{ font: "600 11px var(--f)", padding: "3px 10px", borderRadius: 12, background: opt.risk === "Low" || opt.risk === "Very Low" ? "var(--gb)" : opt.risk === "Medium" ? "#f59e0b15" : "var(--rb)", color: opt.risk === "Low" || opt.risk === "Very Low" ? "var(--g)" : opt.risk === "Medium" ? "var(--ac)" : "var(--r)" }}>{opt.risk}</div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>

          <div className="di"><span className="dil">Payment Timeline</span><span className="div" style={{ fontFamily: "var(--f)", fontSize: 10 }}>{opt.days}</span></div>

      </div>

      <div className="ds"><h4>ECGC Calculator — {deal.destination_country}</h4>
        <div className="dg">
          <div className="di"><span className="dil">FOB Value</span><span className="div">${fob.toLocaleString()}</span></div>
          <div className="di"><span className="dil">CIF Estimate (FOB+15%)</span><span className="div">${cifEst.toFixed(0)}</span></div>
          <div className="di"><span className="dil">ECGC Rate ({deal.destination_country})</span><span className="div">{ecgcRate}%</span></div>
          <div className="di"><span className="dil">Annual Premium</span><span className="div" style={{ color: "var(--g)" }}>${ecgcPremium.toFixed(0)} (₹{Math.round(ecgcPremium * 85).toLocaleString()})</span></div>

        </div>
      </div>

      {payments.length > 0 && <div className="ds"><h4>Payment Tranches</h4>
        {payments.map((p, i) => <div className="di" key={i} style={{ marginBottom: 4 }}>
          <span className="dil">{p.tranche_name}</span>
          <span className="div" style={{ color: p.status === "received" ? "var(--g)" : p.status === "overdue" ? "var(--r)" : "var(--ac)" }}>${p.amount_usd} — {p.status}</span>
        </div>)}
      </div>}
    </div>
  </div>);
}

/* ═══ POST-SHIPMENT RECOVERY (TIER 2) ═══ */
const RODTEP_RATES = { "0910.30": 3.2, "0908.31": 2.8, "0904.11": 3.0, "1211.90": 3.5, "1701.13": 2.5, "0904.21": 3.2, "1207.40": 2.8, "0901.11": 2.0, "1202.42": 2.5, "0909.31": 3.0 };
const DRAWBACK_RATES = { "0910.30": 1.5, "0908.31": 1.0, "0904.11": 1.5, "1211.90": 2.0, "1701.13": 1.8, "0904.21": 1.5, "1207.40": 1.5, "0901.11": 1.0, "1202.42": 1.5, "0909.31": 1.5 };

function RecoveryMod({ deal }) {
  const fobInr = (deal.fob_price_total_usd || 0) * 85;
  const rodtepRate = RODTEP_RATES[deal.hs_code] || 2.5;
  const drawbackRate = DRAWBACK_RATES[deal.hs_code] || 1.5;
  const rodtep = fobInr * rodtepRate / 100;
  const drawback = fobInr * drawbackRate / 100;
  const igstRate = 5;
  const igstRefund = (deal.procurement_cost_total_inr || 0) * igstRate / 100;
  const total = rodtep + drawback + igstRefund;

  const items = [
    { name: "RoDTEP Scrip", amount: rodtep, rate: `${rodtepRate}% of FOB`, status: "eligible", deadline: "Within 1 year of Let Export Order", authority: "DGFT via ICEGATE", note: "Electronic scrip credited to ICEGATE account. Can be sold or used for duty payment." },
    { name: "Duty Drawback", amount: drawback, rate: `${drawbackRate}% of FOB`, status: "eligible", deadline: "Within 3 months of export (extendable)", authority: "Customs via ICEGATE", note: "Auto-credited if shipping bill filed correctly. Check DBK schedule for exact rate." },
    { name: "IGST Refund (Input)", amount: igstRefund, rate: `${igstRate}% on inputs`, status: "eligible", deadline: "With GST return filing", authority: "GST Portal", note: "Refund of IGST paid on procurement. File in GSTR-1 as export with payment of IGST." },
  ];

  return (<div>
    <div className="cd2"><h3>💰 Post-Shipment Recovery</h3>
      <p style={{ fontSize: 12, color: "var(--t2)", marginTop: -8, marginBottom: 14 }}>Money owed to you after shipment · Don't leave it on the table</p>
      <div className="sc" style={{ borderLeft: "3px solid var(--g)", marginBottom: 16 }}>
        <div className="scl">Total Recoverable</div>
        <div className="scv" style={{ color: "var(--g)" }}>{fI(total)}</div>
        <div className="scs">{((total / (deal.capital_deployed_inr || 1)) * 100).toFixed(1)}% of deployed capital · 3 incentive schemes</div>
      </div>
      {items.map((item, i) => <div className="bc" key={i}>
        <div className="bch"><div><div className="bcn">{item.name}</div><div className="bcc">{item.rate} · {item.authority}</div></div>
          <div style={{ textAlign: "right" }}><div style={{ font: "700 18px var(--m)", color: "var(--g)" }}>{fI(item.amount)}</div>
            <div style={{ font: "9px var(--f)", color: "var(--t3)" }}>${(item.amount / 85).toFixed(0)} USD</div></div>
        </div>
        <div className="dg" style={{ marginBottom: 8 }}>
          <div className="di"><span className="dil">Status</span><span className="div" style={{ color: "var(--ac)" }}>{item.status}</span></div>
          <div className="di"><span className="dil">Deadline</span><span className="div" style={{ fontFamily: "var(--f)", fontSize: 10 }}>{item.deadline}</span></div>
        </div>
        <p style={{ fontSize: 10, color: "var(--t2)", fontStyle: "italic" }}>{item.note}</p>
      </div>)}
      <div style={{ background: "var(--b1)", borderRadius: 8, padding: 14, fontSize: 12, color: "var(--t2)", lineHeight: 1.6 }}>
        <strong style={{ color: "var(--r)" }}>Warning:</strong> Most Indian exporters lose 3-7% of annual revenue by not claiming these incentives. On this deal alone, that's {fI(total)} — more than your freight cost. File within deadlines.
      </div>
    </div>
    <div className="cd2"><h3>📋 eBRC & Bank Realisation</h3>
      {[{ n: "Bank realisation of export proceeds", d: "AD bank confirms receipt of USD payment" }, { n: "eBRC filing on DGFT", d: "Electronic Bank Realisation Certificate — required for RoDTEP" }, { n: "RoDTEP claim on ICEGATE", d: "File against shipping bill number" }, { n: "Duty drawback credit check", d: "Auto-credited 15-30 days after LEO if SB is correct" }, { n: "GST refund claim (GSTR-1)", d: "File export invoice in monthly GST return" }].map((item, i) =>
        <div className="doc" key={i}><div className="dst dns" /><div className="dtx"><div className="dtn">{item.n}</div><div className="dta">{item.d}</div></div></div>)}
    </div>
  </div>);
}

/* ═══ FX MODULE (TIER 2) ═══ */
function FxMod({ deal }) {
  const [rates, sR] = useState([]); const [ld, sLd] = useState(true);
  useEffect(() => { (async () => {
    const r = await sbGet("fx_rates", "?base_currency=eq.USD&target_currency=eq.INR&order=recorded_at.desc&limit=5");
    sR(r || []); sLd(false);
  })(); }, []);

  const fobUsd = deal.fob_price_total_usd || 0;
  const latest = rates[0] || { spot_rate: 85, forward_30d: 85.3, forward_60d: 85.6, forward_90d: 85.9 };
  const prev = rates[1] || latest;
  const change = ((latest.spot_rate - prev.spot_rate) / prev.spot_rate * 100).toFixed(2);
  const isWeakening = change > 0;

  const spotInr = fobUsd * latest.spot_rate;
  const fwd30Inr = fobUsd * (latest.forward_30d || latest.spot_rate);
  const fwd60Inr = fobUsd * (latest.forward_60d || latest.spot_rate);
  const fwd90Inr = fobUsd * (latest.forward_90d || latest.spot_rate);

  if (ld) return <div><div className="sp" /><p className="mu">Loading FX rates...</p></div>;
  return (<div>
    <div className="cd2"><h3>💱 FX & Hedging — USD/INR</h3>
      <div className="s3" style={{ marginBottom: 16 }}>
        <div className="sc" style={{ borderLeft: "3px solid var(--ac)" }}><div className="scl">Spot Rate</div><div className="scv" style={{ color: "var(--ac)" }}>₹{latest.spot_rate}</div>
          <div className="scs" style={{ color: isWeakening ? "var(--g)" : "var(--r)" }}>{isWeakening ? "▲ INR weakening" : "▼ INR strengthening"} ({change}%)</div></div>
        <div className="sc"><div className="scl">30d Forward</div><div className="scv" style={{ color: "var(--bl)" }}>₹{latest.forward_30d}</div><div className="scs">Premium: ₹{(latest.forward_30d - latest.spot_rate).toFixed(2)}</div></div>
        <div className="sc"><div className="scl">90d Forward</div><div className="scv" style={{ color: "var(--bl)" }}>₹{latest.forward_90d}</div><div className="scs">Premium: ₹{(latest.forward_90d - latest.spot_rate).toFixed(2)}</div></div>
      </div>
      <div className="ds"><h4>Your USD Exposure — ${fobUsd.toLocaleString()}</h4>
        <div className="dg">
          <div className="di"><span className="dil">At Spot (today)</span><span className="div" style={{ color: "var(--ac)" }}>{fI(spotInr)}</span></div>
          <div className="di"><span className="dil">At 30d Forward</span><span className="div">{fI(fwd30Inr)}</span></div>
          <div className="di"><span className="dil">At 60d Forward</span><span className="div">{fI(fwd60Inr)}</span></div>
          <div className="di"><span className="dil">At 90d Forward</span><span className="div">{fI(fwd90Inr)}</span></div>
          <div className="di"><span className="dil">Gain if INR weakens 1%</span><span className="div" style={{ color: "var(--g)" }}>{fI(spotInr * 0.01)}</span></div>
          <div className="di"><span className="dil">Loss if INR strengthens 1%</span><span className="div" style={{ color: "var(--r)" }}>{fI(spotInr * 0.01)}</span></div>
        </div>
      </div>
      <div style={{ background: "var(--b1)", borderRadius: 8, padding: 14, fontSize: 12, color: "var(--t2)", lineHeight: 1.6 }}>
        <strong style={{ color: "var(--ac)" }}>Hedging Advice:</strong> {isWeakening
          ? `INR is weakening — favorable for exporters. Your receivable of $${fobUsd.toLocaleString()} is worth more each day. Consider NOT hedging if you expect this trend to continue, or book a partial forward (50%) to lock some gains.`
          : `INR is strengthening — risky for exporters. Your $${fobUsd.toLocaleString()} receivable loses ₹${Math.round(spotInr * 0.01).toLocaleString()} for every 1% move. Consider booking a forward contract at ₹${latest.forward_30d} to lock your margin.`}
      </div>
    </div>
  </div>);
}

/* ═══ DEAL WORKSPACE ═══ */
function DealWS({ deal, trader, lane, onBack, onUpd }) {
  const ci = PL.findIndex(s => s.k === deal.status);
  const [tab, sT] = useState("overview");
  const linkBuyer = async b => {
    const u = await sbPatch("deals", deal.id, { buyer_id: b.id, status: "buyer_shortlisted", state_history: JSON.stringify([...jp(deal.state_history), { state: "buyer_shortlisted", at: new Date().toISOString(), note: `Buyer: ${b.company_name}` }]) });
    if (u?.length) onUpd(u[0]);
  };
  const linkSupplier = async s => {
    const u = await sbPatch("deals", deal.id, { supplier_id: s.id, state_history: JSON.stringify([...jp(deal.state_history), { state: "supplier_identified", at: new Date().toISOString(), note: `Supplier: ${s.name}` }]) });
    if (u?.length) onUpd(u[0]);
  };
  return (<div>
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
      <div><button className="bk" onClick={onBack}>← Back</button>

      <div style={{ font: "600 11px var(--f)", padding: "5px 12px", borderRadius: 16, background: "var(--ag)", color: "var(--ac)", border: "1px solid var(--ac)" }}>{PL[ci]?.i} {PL[ci]?.l}</div>
    </div>
    <div className="pp">{PL.map((s, i) => <div key={s.k} className={`ps ${i === ci ? "ac" : i < ci ? "cp" : ""}`}><div className="psi">{s.i}</div><div className="psl">{s.l}</div></div>)}</div>
    <div className="s3">
      <div className="sc"><div className="scl">Capital</div><div className="scv" style={{ color: "var(--ac)" }}>{fI(deal.capital_deployed_inr || 0)}</div></div>
      <div className="sc"><div className="scl">Quantity</div><div className="scv" style={{ color: "var(--bl)" }}>{((deal.quantity_kg || 0) / 1000).toFixed(1)}T</div></div>
      <div className="sc"><div className="scl">Profit</div><div className="scv" style={{ color: "var(--g)" }}>{fI(deal.profit_inr || 0)}</div><div className="scs">{deal.expected_margin_pct}%</div></div>
    </div>
    <div className="tb">{[{ k: "overview", l: "Overview" }, { k: "buyers", l: "🔍 Buyers" }, { k: "suppliers", l: "🏭 Suppliers" }, { k: "pricing", l: "💰 Pricing" }, { k: "logistics", l: "🚢 Logistics" }, { k: "payment", l: "🔒 Payment" }, { k: "compliance", l: "📋 Compliance" }, { k: "docs", l: "📄 Docs" }, { k: "recovery", l: "🎁 Recovery" }, { k: "fx", l: "💱 FX" }].map(t => <button key={t.k} className={`ti ${tab === t.k ? "a" : ""}`} onClick={() => sT(t.k)}>{t.l}</button>)}</div>
    {tab === "overview" && <div>
      <div className="cd2"><h3>🎯 Next Actions</h3>
        {[{ i: "🔍", l: "Find Buyers", d: `Discover importers in ${deal.destination_country}`, t: "buyers" }, { i: "🏭", l: "Find Suppliers", d: "Mandi prices + landed cost comparison", t: "suppliers" }, { i: "💰", l: "Compute Pricing", d: "Floor / Market / Ceiling analysis", t: "pricing" }, { i: "🚢", l: "Plan Logistics", d: "Freight rates, routing, container booking", t: "logistics" }, { i: "🔒", l: "Payment Security", d: "ECGC, LC, payment terms", t: "payment" }, { i: "📋", l: "Compliance", d: "Document checklist + tracking", t: "compliance" }, { i: "📄", l: "Generate Documents", d: "PI, CI, Packing List — auto-filled", t: "docs" }, { i: "🎁", l: "Post-Shipment Recovery", d: "RoDTEP, drawback, IGST refund", t: "recovery" }, { i: "💱", l: "FX & Hedging", d: "Live rates, exposure, hedge advice", t: "fx" }].map((a, i) =>
          <div className="ai" key={i} onClick={() => a.t && sT(a.t)}><span className="aii">{a.i}</span><div className="ait"><div className="atl">{a.l}</div><div className="atd">{a.d}</div></div><span style={{ color: "var(--t3)", fontSize: 13 }}>{a.t ? "→" : "🔒"}</span></div>)}
      </div>

        {[["Product", deal.product_name, true], ["HS Code", deal.hs_code], ["Destination", deal.destination_country, true], ["Incoterm", deal.incoterm], ["Procurement ₹/kg", `₹${deal.procurement_cost_per_kg_inr}`], ["FOB $/kg", `$${deal.fob_price_per_kg_usd}`], ["Procurement Total", fI(deal.procurement_cost_total_inr || 0)], ["FOB Total", `$${deal.fob_price_total_usd?.toLocaleString()}`]].map(([l, v, fb], i) =>
          <div className="di" key={i}><span className="dil">{l}</span><span className="div" style={fb ? { fontFamily: "var(--f)" } : {}}>{v}</span></div>)}

    {tab === "buyers" && <BuyerMod deal={deal} lane={lane} onLink={linkBuyer} />}

  </div>);
}

/* ═══ DASHBOARD (TIER 2/3) ═══ */
function Dashboard({ trader, deals, onDealClick, onNewDeal }) {
  const active = deals.filter(d => d.status !== "deal_closed");
  const [refreshing, sRef] = useState(false);
  const [liveFx, sLFx] = useState(null);
  
  useEffect(() => { (async () => {
    const r = await sbGet("fx_rates", "?base_currency=eq.USD&target_currency=eq.INR&source=eq.exchangerate-api&order=recorded_at.desc&limit=1");
    if (r?.[0]) sLFx(r[0]);
  })(); }, []);

  const doRefresh = async () => { sRef(true); await refreshData(); const r = await sbGet("fx_rates", "?base_currency=eq.USD&target_currency=eq.INR&source=eq.exchangerate-api&order=recorded_at.desc&limit=1"); if (r?.[0]) sLFx(r[0]); sRef(false); };
  const closed = deals.filter(d => d.status === "deal_closed");
  const totalDeployed = deals.reduce((a, d) => a + (d.capital_deployed_inr || 0), 0);
  const totalProfit = deals.reduce((a, d) => a + (d.profit_inr || 0), 0);
  const totalRevenue = deals.reduce((a, d) => a + ((d.fob_price_total_usd || 0) * 85), 0);

  return (<div>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
      <div className="rh" style={{ marginBottom: 0, borderBottom: "none", paddingBottom: 0 }}><h2>Dashboard</h2><p>{trader?.name} · {deals.length} deals · {active.length} active</p></div>
      <button className="btn b2" onClick={doRefresh} disabled={refreshing} style={{ fontSize: 11, whiteSpace: "nowrap" }}>
        {refreshing ? "⟳ Refreshing..." : "⟳ Refresh Live Data"}
      </button>
    </div>
    
    {liveFx && <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
      <span className="tgi tf" style={{ fontSize: 11 }}>USD/INR ₹{liveFx.spot_rate} (live)</span>
      <span className="tgi td" style={{ fontSize: 11 }}>Source: exchangerate-api</span>
      <span className="tgi" style={{ fontSize: 11, background: "var(--b3)", color: "var(--t2)" }}>Mandi: data.gov.in</span>
      <span className="tgi" style={{ fontSize: 11, background: "var(--b3)", color: "var(--t2)" }}>Updated: {new Date(liveFx.recorded_at).toLocaleDateString()}</span>
    </div>}

    <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10, marginBottom: 20 }}>
      <div className="sc"><div className="scl">Total Capital</div><div className="scv" style={{ color: "var(--ac)" }}>{fI(trader?.available_capital || 0)}</div></div>
      <div className="sc"><div className="scl">Deployed</div><div className="scv" style={{ color: "var(--bl)" }}>{fI(totalDeployed)}</div><div className="scs">{deals.length} deals</div></div>
      <div className="sc"><div className="scl">Expected Profit</div><div className="scv" style={{ color: "var(--g)" }}>{fI(totalProfit)}</div><div className="scs">All deals combined</div></div>
      <div className="sc"><div className="scl">Live FX (USD/INR)</div><div className="scv" style={{ color: "var(--ac)" }}>₹{liveFx?.spot_rate || FX}</div><div className="scs">30d fwd: ₹{liveFx?.forward_30d || "—"}</div></div>
    </div>

    <div className="cd2"><h3>📊 Active Deals ({active.length})</h3>
      {active.length === 0 && <p style={{ fontSize: 13, color: "var(--t3)", padding: 20, textAlign: "center" }}>No active deals yet. Find a trade lane to start your first deal.</p>}
      {active.map(d => {
        const ci = PL.findIndex(s => s.k === d.status);
        const progress = ((ci + 1) / PL.length * 100).toFixed(0);
        return (<div className="bc" key={d.id} onClick={() => onDealClick(d)} style={{ cursor: "pointer" }}>
          <div className="bch"><div>
            <div className="bcn">{d.product_name} → {d.destination_country}</div>
            <div className="bcc">{d.deal_number} · {PL[ci]?.i} {PL[ci]?.l}</div></div>
            <div style={{ textAlign: "right" }}><div style={{ font: "700 16px var(--m)", color: "var(--g)" }}>{fI(d.profit_inr || 0)}</div>
              <div style={{ font: "9px var(--f)", color: "var(--t3)" }}>{d.expected_margin_pct}% margin</div></div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 6, marginBottom: 8 }}>
            <div className="bmi"><div className="bmil">Capital</div><div className="bmiv">{fI(d.capital_deployed_inr || 0)}</div></div>
            <div className="bmi"><div className="bmil">Quantity</div><div className="bmiv">{((d.quantity_kg || 0) / 1000).toFixed(1)}T</div></div>
            <div className="bmi"><div className="bmil">Progress</div><div className="bmiv" style={{ color: "var(--ac)" }}>{progress}%</div></div>
          </div>
          <div style={{ height: 4, background: "var(--b3)", borderRadius: 2, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${progress}%`, background: "linear-gradient(90deg,var(--ac),var(--g))", borderRadius: 2 }} /></div>
        </div>);
      })}
    </div>

    <button className="ab" onClick={onNewDeal} style={{ marginTop: 8 }}>+ Find New Trade Lane</button>
  </div>);
}

/* ═══ MAIN ═══ */
function App() {
  const [scr, sS] = useState("ob"); const [tr, sT] = useState(null); const [lanes, sL] = useState([]); const [exp, sE] = useState(null); const [ld, sLd] = useState(false); const [deal, sD] = useState(null); const [dLane, sDL] = useState(null);
  const [allDeals, sAD] = useState([]);
  const [customProduct, sCP] = useState(""); const [customDest, sCD] = useState(""); const [customLane, sCL] = useState(null); const [analyzing, sAn] = useState(false);

  const analyzeCustom = async () => {
    if (!customProduct.trim() || !customDest.trim()) return;
    sAn(true); sCL(null);
    const result = await analyzeTradeLane(customProduct, customDest, tr?.available_capital || 1000000);
    if (result?.data) {
      sCL({ ...result.data, id: "custom_" + Date.now(), source: result.source });
    }
    sAn(false);
  };
  const load = async t => { sLd(true); const l = await sbGet("trade_lanes", `?min_capital_required_inr=lte.${t.available_capital}&order=opportunity_score.desc`); sL(l || []); sLd(false); };
  const loadDeals = async t => { const d = await sbGet("deals", `?trader_id=eq.${t.id}&order=created_at.desc`); sAD(d || []); };
  const onboard = t => { sT(t); loadDeals(t); sS("dash"); load(t); };
  const accept = async (lane, qty, prof) => {
    const dn = `DEAL-${new Date().getFullYear()}-${String(Math.floor(Math.random() * 9000) + 1000)}`;
    const r = await sbPost("deals", { trader_id: tr.id, trade_lane_id: lane.id, deal_number: dn, status: "trade_lane_analyzed", product_name: lane.product_name, hs_code: lane.hs_code, destination_country: lane.destination_country, quantity_kg: qty, procurement_cost_per_kg_inr: lane.avg_procurement_cost_per_kg_inr, procurement_cost_total_inr: qty * lane.avg_procurement_cost_per_kg_inr, fob_price_per_kg_usd: lane.avg_fob_price_per_kg_usd, fob_price_total_usd: qty * lane.avg_fob_price_per_kg_usd, expected_margin_pct: lane.estimated_margin_pct, capital_deployed_inr: tr.available_capital, profit_inr: prof, origin_port: lane.nearest_port, incoterm: "FOB", state_history: JSON.stringify([{ state: "trade_lane_analyzed", at: new Date().toISOString(), note: "Accepted" }]) });
    if (r?.length) { sD(r[0]); sDL(lane); sAD(prev => [r[0], ...prev]); sS("deal"); }
  };
  const openDeal = async d => {
    const lanes = await sbGet("trade_lanes", `?id=eq.${d.trade_lane_id}`);
    sD(d); sDL(lanes?.[0] || null); sS("deal");
  };

  const capBrkdn = cap => {
    const p = Math.round(cap * .65), items = [{ l: "Goods", v: p, p: 65, c: "var(--ac)" }, { l: "Freight", v: Math.round(cap * .06), p: 6, c: "var(--bl)" }, { l: "Processing", v: Math.round(cap * .04), p: 4, c: "var(--ac)" }, { l: "Transport", v: Math.round(cap * .025), p: 2.5, c: "var(--g)" }, { l: "Bank", v: Math.round(cap * .025), p: 2.5, c: "#ec4899" }, { l: "Other", v: cap - p - Math.round(cap * .235), p: 10, c: "var(--t3)" }];
    return (<div className="CB"><h3>Capital Allocation — {fI(cap)}</h3>
      <div className="cbar">{items.map((it, i) => <div key={i} className="cbf" style={{ width: `${it.p}%`, background: it.c }} />)}</div>
      <div style={{ marginTop: 14 }}>{items.map((it, i) => <div className="cr" key={i}><span className="crl" style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 7, height: 7, borderRadius: 2, background: it.c, display: "inline-block" }} />{it.l}</span><span className="crv">{fI(it.v)}</span></div>)}
        <div className="cr tot"><span className="crl">For Goods</span><span className="crv">{fI(p)}</span></div></div></div>);
  };

  const laneCard = (lane, i) => {
    const proc = (tr?.available_capital || 0) * .65, qty = Math.round(proc / lane.avg_procurement_cost_per_kg_inr), rev = qty * lane.avg_fob_price_per_kg_usd * FX, prof = rev - (tr?.available_capital || 0);
    const cyc = lane.time_to_first_shipment_days + 15, cpy = Math.floor(365 / cyc), annR = ((prof * cpy / (tr?.available_capital || 1)) * 100).toFixed(0);
    const sc = lane.opportunity_score >= 85 ? "Lsh" : lane.opportunity_score >= 70 ? "Lsm" : "Lsl";
    const isExp = exp === lane.id; const seas = jp(lane.seasonality); const certs = jp(lane.certifications_required); const risks = jp(lane.risk_factors);
    return (<div key={lane.id} className={`LC ${isExp ? "x" : ""}`} onClick={() => sE(isExp ? null : lane.id)}>
      <div className="Lr">#{i + 1}</div>
      <div className="Lt"><div className={`Ls ${sc}`}>{lane.opportunity_score}</div><div><div className="Ln">{lane.product_name}</div><div className="Lro">{lane.origin_region} <span className="ar">→</span> {lane.destination_country}</div></div></div>
      <div className="mg">
        <div className="mb"><div className="mbl">Quantity</div><div className="mbv vb">{(qty / 1000).toFixed(1)}T</div></div>
        <div className="mb"><div className="mbl">Margin</div><div className="mbv vg">{lane.estimated_margin_pct}%</div><div className="mbs">{fI(prof)}/deal</div></div>
        <div className="mb"><div className="mbl">Cycle</div><div className="mbv va">{cyc}d</div><div className="mbs">{cpy}/yr</div></div>
        <div className="mb"><div className="mbl">Annual</div><div className="mbv vg">{annR}%</div><div className="mbs">{fI(prof * cpy)}/yr</div></div>
      </div>
      <div className="tg">
        {lane.fta_applicable && <span className="tgi tf">✓ {lane.fta_name} {lane.preferential_duty_pct}%</span>}
        {lane.demand_trend === "growing" && <span className="tgi td">↑ +{lane.demand_growth_pct}%</span>}
        <span className={`tgi tr${lane.risk_level[0]}`}>● {lane.risk_level}</span>
        {lane.india_market_share_pct > 50 && <span className="tgi td">India {lane.india_market_share_pct}%</span>}
      </div>
      {isExp && <div className="LD" onClick={e => e.stopPropagation()}>
        <div className="ds"><h4>Economics</h4><div className="dg">
          {[["Procurement", `₹${lane.avg_procurement_cost_per_kg_inr}/kg`], ["FOB", `$${lane.avg_fob_price_per_kg_usd}/kg`], ["CIF", `$${lane.avg_cif_price_per_kg_usd}/kg`], ["Revenue", fI(rev)], ["MFN duty", `${lane.mfn_duty_pct || 0}%`], ["Your duty", `${lane.preferential_duty_pct ?? lane.mfn_duty_pct ?? 0}%`], ["Min qty", `${lane.min_viable_quantity_kg?.toLocaleString()} kg`], ["First ship", `${lane.time_to_first_shipment_days} days`]].map(([l, v], j) =>
            <div className="di" key={j}><span className="dil">{l}</span><span className="div">{v}</span></div>)}
        </div></div>
        {Object.keys(seas).length > 0 && <div className="ds"><h4>Seasonality</h4><div className="dg">{Object.entries(seas).map(([k, v]) => <div className="di" key={k}><span className="dil">{k.replace(/_/g, " ")}</span><span className="div" style={{ fontSize: 10, fontFamily: "var(--f)" }}>{v}</span></div>)}</div></div>}
        <div className="ds"><h4>Certifications ({certs.length})</h4><ul className="cl">{certs.map((c, j) => <li key={j}>{c}</li>)}</ul></div>
        <div className="ds"><h4>Risks</h4><ul className="rl">{risks.map((r, j) => <li key={j}>{r}</li>)}</ul></div>
        <button className="ab" onClick={e => { e.stopPropagation(); accept(lane, qty, prof); }}>Accept — Begin Execution →</button>
      </div>}
    </div>);
  };

  return (<><style>{css}</style><div className="A">
    <div className="H"><div className="Hl"><div className="Hm">T</div><div><div className="Ht">TradeOS Autopilot</div><div className="Hs">Autonomous Trade Execution</div></div></div>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        {tr && scr !== "ob" && <button className="bk" onClick={() => sS("dash")} style={{ fontSize: 11, padding: "5px 10px" }}>Dashboard</button>}
        {tr && <><div className="Hd" /><span className="Hr">{tr.name} · {fI(tr.available_capital)}</span></>}
      </div></div>
    {scr === "ob" && <Onboarding onDone={onboard} />}
    {scr === "dash" && <Dashboard trader={tr} deals={allDeals} onDealClick={openDeal} onNewDeal={() => sS("res")} />}
    {scr === "res" && ld && <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "60vh" }}><div className="sp" /><p className="mu">Analyzing {fI(tr?.available_capital || 0)} across trade lanes...</p></div>}
    {scr === "res" && !ld && <div>
      <div className="rh"><h2>Trade Lanes for {fI(tr?.available_capital || 0)}</h2><p>{lanes.length} pre-analyzed lanes + analyze ANY product below</p></div>
      
      <div className="cd2" style={{ borderLeft: "3px solid var(--ac)" }}>
        <h3>🔍 Analyze Any Product — AI + Web Search</h3>
        <p style={{ fontSize: 12, color: "var(--t2)", marginTop: -8, marginBottom: 14 }}>Not limited to pre-seeded products. Enter ANY product and destination — AI finds real data.</p>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: 10, alignItems: "end" }}>
          <div><label className="fl">Product</label><input className="fi" placeholder="e.g. Cashew nuts, Basmati rice, Leather bags" value={customProduct} onChange={e => sCP(e.target.value)} /></div>
          <div><label className="fl">Destination</label><input className="fi" placeholder="e.g. Vietnam, UK, Brazil" value={customDest} onChange={e => sCD(e.target.value)} /></div>
          <button className="btn b1" onClick={analyzeCustom} disabled={analyzing || !customProduct.trim() || !customDest.trim()} style={{ padding: "11px 20px", height: 44 }}>{analyzing ? "Analyzing..." : "Analyze →"}</button>
        </div>
        {analyzing && <div style={{ marginTop: 16 }}><div className="sp" /><p className="mu">AI searching web for real trade data on {customProduct} → {customDest}...</p></div>}
        {customLane && <div style={{ marginTop: 16, background: "var(--b1)", borderRadius: 10, padding: 18, border: "1px solid var(--ba)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
            <div><div style={{ font: "600 16px var(--f)" }}>{customLane.product_name || customProduct}</div>
              <div style={{ font: "11px var(--f)", color: "var(--t3)" }}>{customLane.origin_region || "India"} → {customLane.destination_country || customDest} · via {customLane.nearest_port || "TBD"}</div></div>
            <div style={{ font: "600 11px var(--f)", padding: "3px 10px", borderRadius: 12, background: "var(--ag)", color: "var(--ac)" }}>🌐 {customLane.source === "cache" ? "Cached" : "Live AI"}</div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 12 }}>
            <div className="bmi"><div className="bmil">Procurement</div><div className="bmiv">₹{customLane.avg_procurement_cost_per_kg_inr || "?"}/kg</div></div>
            <div className="bmi"><div className="bmil">FOB Price</div><div className="bmiv">${customLane.avg_fob_price_per_kg_usd || "?"}/kg</div></div>
            <div className="bmi"><div className="bmil">Est. Margin</div><div className="bmiv" style={{ color: "var(--g)" }}>{customLane.estimated_margin_pct || "?"}%</div></div>
            <div className="bmi"><div className="bmil">Score</div><div className="bmiv" style={{ color: "var(--ac)" }}>{customLane.opportunity_score || "?"}</div></div>
          </div>
          {customLane.risk_factors && <div style={{ marginBottom: 10 }}>{jp(customLane.risk_factors).slice(0, 3).map((r, i) => <span key={i} className="tgi trm" style={{ marginRight: 4 }}>⚠ {r}</span>)}</div>}
          <button className="ab" onClick={() => {
            const cl = { ...customLane, id: customLane.id, avg_procurement_cost_per_kg_inr: customLane.avg_procurement_cost_per_kg_inr || 100, avg_fob_price_per_kg_usd: customLane.avg_fob_price_per_kg_usd || 2, estimated_margin_pct: customLane.estimated_margin_pct || 15, time_to_first_shipment_days: customLane.time_to_first_shipment_days || 45 };
            const proc = (tr?.available_capital || 0) * 0.65; const qty = Math.round(proc / cl.avg_procurement_cost_per_kg_inr);
            const rev = qty * cl.avg_fob_price_per_kg_usd * FX; const prof = rev - (tr?.available_capital || 0);
            accept(cl, qty, prof);
          }}>Accept & Begin Execution →</button>
        </div>}
      </div>

      {capBrkdn(tr?.available_capital || 0)}
      <div style={{ font: "600 13px var(--f)", color: "var(--t3)", marginBottom: 12, textTransform: "uppercase", letterSpacing: 1 }}>Pre-Analyzed Lanes</div>
      {lanes.map((l, i) => laneCard(l, i))}
    </div>}
    {scr === "deal" && deal && <DealWS deal={deal} trader={tr} lane={dLane} onBack={() => { loadDeals(tr); sS("dash"); }} onUpd={d => sD(d)} />}
  </div></>);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
